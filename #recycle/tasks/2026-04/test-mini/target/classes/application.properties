spring.application.name=test-mini

# H2 Database（开发/测试用）
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console（浏览器访问）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080
server.address=0.0.0.0

# Spring Security - 暂时禁用，后续开启
spring.security.enabled=false

# Spring AI
spring.ai.openai.api-key=${OPENAI_API_KEY:EMPTY}
spring.ai.openai.base-url=https://api.minimaxi.com/v1
spring.ai.openai.chat.options.model=minimax-abo-functioncall
